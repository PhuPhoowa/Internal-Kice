<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Management — Internal Kice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'IBM Plex Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #F5F3EF;
    color: #2C2C2C;
    min-height: 100vh;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 44px; height: 56px;
    border-bottom: 1px solid #E2DED8;
    background: #F5F3EF;
    position: sticky; top: 0; z-index: 200;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; color: #7A7470; text-decoration: none;
    padding: 6px 10px; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .back-btn:hover { background: #ECEAE6; color: #2C2C2C; }
  .back-btn svg { width: 16px; height: 16px; }
  .topbar-divider { width: 1px; height: 20px; background: #E2DED8; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #2C2C2C; }
  .topbar-date { font-size: 14px; color: #9E9890; }

  /* ── Container ── */
  .container { max-width: 1000px; margin: 0 auto; padding: 48px 44px 80px; }

  /* ── Page header ── */
  .page-eyebrow {
    font-size: 11px; font-weight: 500; color: #A8A29A;
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
  }
  .page-title { font-size: 26px; font-weight: 600; color: #1E1E1E; letter-spacing: -0.02em; margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: #7A7470; margin-bottom: 24px; }

  /* ── Search ── */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #A8A29A; pointer-events: none;
  }
  .search-icon svg { width: 17px; height: 17px; }
  .search-input {
    width: 100%; padding: 11px 16px 11px 42px;
    font-size: 14px; font-family: inherit;
    background: #FAFAF8; border: 1px solid #E2DED8; border-radius: 10px;
    color: #2C2C2C; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: #B8B2AA; }
  .search-input:focus { border-color: #A8A29A; box-shadow: 0 0 0 3px rgba(168,162,154,0.15); }

  /* ── Filter tags ── */
  .filter-wrap {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 24px;
  }
  .filter-btn {
    padding: 6px 14px; font-size: 13px; font-family: inherit;
    background: #FAFAF8; border: 1px solid #E2DED8; border-radius: 20px;
    color: #7A7470; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .filter-btn:hover { background: #ECEAE6; border-color: #C8C2BA; color: #2C2C2C; }
  .filter-btn.active { background: #2C2C2C; border-color: #2C2C2C; color: #F5F3EF; }

  .page-divider { border: none; border-top: 1px solid #E2DED8; margin-bottom: 28px; }

  /* ── Stats bar ── */
  .stats-bar {
    font-size: 13px; color: #A8A29A; margin-bottom: 20px;
  }
  .stats-bar span { color: #2C2C2C; font-weight: 600; }

  /* ── Doc grid ── */
  .doc-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  /* ── Doc card ── */
  .doc-card {
    background: #FAFAF8;
    border: 1px solid #E2DED8;
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
  }
  .doc-card:hover {
    border-color: #C8C2BA;
    box-shadow: 0 4px 14px rgba(0,0,0,0.07);
    transform: translateY(-1px);
  }
  .doc-card.hidden { display: none; }

  .doc-card-top { display: flex; align-items: flex-start; gap: 12px; }

  .doc-icon {
    width: 38px; height: 38px; border-radius: 9px;
    background: #ECEAE6; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .doc-meta { flex: 1; min-width: 0; }
  .doc-category {
    font-size: 10px; font-weight: 600; color: #A8A29A;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .doc-name {
    font-size: 13px; font-weight: 600; color: #1E1E1E;
    line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .doc-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid #ECEAE6;
  }
  .doc-date { font-size: 11px; color: #B8B2AA; }

  /* Action buttons */
  .doc-actions { display: flex; gap: 6px; }
  .doc-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 11px; border-radius: 7px; border: none;
    font-size: 12px; font-family: inherit; font-weight: 500;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .doc-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .doc-btn-view {
    background: #ECEAE6; color: #2C2C2C;
  }
  .doc-btn-view:hover { background: #E2DED8; }
  .doc-btn-dl {
    background: #2C2C2C; color: #F5F3EF;
  }
  .doc-btn-dl:hover { background: #1E1E1E; }

  /* no result */
  .no-result {
    display: none; grid-column: 1/-1;
    text-align: center; padding: 64px 0;
    font-size: 14px; color: #B8B2AA;
  }

  /* ── PDF Viewer Modal ── */
  .pdf-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,18,16,0.7);
    z-index: 500; align-items: center; justify-content: center;
    padding: 20px;
  }
  .pdf-overlay.open { display: flex; }

  .pdf-modal {
    background: #FAFAF8;
    border-radius: 16px;
    width: 100%; max-width: 860px;
    height: 88vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    overflow: hidden;
    animation: popIn 0.18s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.97) translateY(10px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }

  .pdf-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #E2DED8;
    flex-shrink: 0;
  }
  .pdf-header-title { font-size: 14px; font-weight: 600; color: #1E1E1E; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 16px; }

  .pdf-header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .pdf-action-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 12px; border-radius: 8px; border: none;
    font-size: 13px; font-family: inherit; font-weight: 500;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s;
  }
  .pdf-action-btn svg { width: 14px; height: 14px; }
  .pdf-dl-btn { background: #2C2C2C; color: #F5F3EF; }
  .pdf-dl-btn:hover { background: #1E1E1E; }
  .pdf-close-btn { background: #ECEAE6; color: #7A7470; }
  .pdf-close-btn:hover { background: #E2DED8; color: #2C2C2C; }

  .pdf-body { flex: 1; overflow: hidden; }
  .pdf-body iframe { width: 100%; height: 100%; border: none; display: block; }

  @media (max-width: 760px) {
    .topbar { padding: 0 20px; }
    .container { padding: 32px 20px 60px; }
    .doc-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .doc-grid { grid-template-columns: 1fr; }
    .pdf-modal { height: 92vh; border-radius: 12px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      กลับหน้าหลัก
    </a>
    <div class="topbar-divider"></div>
    <div class="topbar-title">Knowledge Management</div>
  </div>
  <div class="topbar-date" id="today"></div>
</div>

<div class="container">

  <div class="page-eyebrow">คลังความรู้</div>
  <h1 class="page-title">Knowledge Management</h1>
  <p class="page-sub">คู่มือการใช้งานและแก้ปัญหาสำหรับทีม — กด "ดู" เพื่อเปิดไฟล์ หรือ "โหลด" เพื่อดาวน์โหลด</p>

  <div class="search-wrap">
    <div class="search-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </div>
    <input class="search-input" type="text" id="searchInput" placeholder="ค้นหาชื่อเอกสาร..." oninput="applyFilters()">
  </div>

  <div class="filter-wrap" id="filterWrap"></div>

  <hr class="page-divider">
  <div class="stats-bar" id="statsBar"></div>

  <div class="doc-grid" id="docGrid">
    <div class="no-result" id="noResult">ไม่พบเอกสารที่ค้นหา</div>
  </div>

</div>

<!-- PDF Viewer Modal -->
<div class="pdf-overlay" id="pdfOverlay" onclick="closePdfModal(event)">
  <div class="pdf-modal">
    <div class="pdf-header">
      <div class="pdf-header-title" id="pdfTitle"></div>
      <div class="pdf-header-actions">
        <a class="pdf-action-btn pdf-dl-btn" id="pdfDlBtn" download>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          ดาวน์โหลด
        </a>
        <button class="pdf-action-btn pdf-close-btn" onclick="closePdfBtn()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          ปิด
        </button>
      </div>
    </div>
    <div class="pdf-body">
      <iframe id="pdfFrame" src="" title="PDF Viewer"></iframe>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  รายการเอกสาร — แก้ไขตรงนี้
//
//  file: path ของไฟล์ใน GitHub  เช่น "docs/ชื่อไฟล์.pdf"
//  date: วันที่อัพเดตล่าสุด
// ════════════════════════════════════════════════════════════
const docs = [
  // Accountant
  { cat: "Accountant", name: "การเข้าตรวจสอบอุปกรณ์ของทางบัญชีประจำเดือน",       file: "docs/[Accountant] การเข้าตรวจสอบอุปกรณ์ของทางบัญชีประจำเดือน.pdf",       date: "13/12/2024" },
  { cat: "Accountant", name: "การถ่ายรูปค่าไฟฟ้าของ True AIS DTac ทุกวันที่ 25",  file: "docs/[Accountant] การถ่ายรูปค่าไฟฟ้าของ True AIS DTac ทุกวันที่ 25.pdf",  date: "13/12/2024" },
  { cat: "Accountant", name: "การทำเอกสารค่า Internet True และค่าโทรศัพท์ True",  file: "docs/[Accountant] การทำเอกสารค่า Internet True และค่าโทรศัพท์ True.pdf",  date: "13/12/2024" },
  // AV
  { cat: "AV",         name: "การตั้งค่าระบบไมค์โครโฟนที่ Meeting",               file: "docs/[AV] การตั้งค่าระบบไมค์โครโฟนที่ Meeting.pdf",                       date: "14/03/2025" },
  // Building
  { cat: "Building",   name: "การเข้าอาคารเพื่อมาซ่อมหรือเปลี่ยนอุปกรณ์ของ True หรือ Vendor อื่นๆ", file: "docs/[Building] การเข้าอาคารเพื่อมาซ่อมหรือเปลี่ยนอุปกรณ์.pdf", date: "13/12/2024" },
  { cat: "Building",   name: "หลักการแจ้งงานเวลาป้าย Pylon Sign เสีย",            file: "docs/[Building] หลักการแจ้งงานเวลาป้าย Pylon Sign เสีย.pdf",             date: "13/12/2024" },
  // CAD
  { cat: "CAD",        name: "Renew License AutoCAD at Kice",                      file: "docs/[CAD] Renew License AutoCAD at Kice.pdf",                            date: "13/12/2024" },
  // Comanche
  { cat: "Comanche",   name: "โปรแกรม Comanche",                                   file: "docs/[Comanche] โปรแกรม Comanche.pdf",                                    date: "13/12/2024" },
  { cat: "Comanche",   name: "การเบิกอุปกรณ์สำนักงาน",                            file: "docs/[Comanche] การเบิกอุปกรณ์สำนักงาน.pdf",                             date: "19/02/2025" },
  { cat: "Comanche",   name: "ทำลายเช็นดิจิตัลลง Comanche",                       file: "docs/[Comanche] ทำลายเช็นดิจิตัลลง Comanche.pdf",                        date: "09/02/2026" },
  { cat: "Comanche",   name: "วิธี Reset ตัว AR ใน Comanche",                      file: "docs/[Comanche] วิธี Reset ตัว AR ใน Comanche.pdf",                       date: "21/06/2024" },
  { cat: "Comanche",   name: "ออก PR สั่งซื้อของผ่านระบบ Comanche",               file: "docs/[Comanche] ออก PR สั่งซื้อของผ่านระบบ Comanche.pdf",                date: "09/02/2026" },
  // Computer
  { cat: "Computer",   name: "ใช้ Remote Desktop ไม่ได้หลังติดตั้ง Windows Updates", file: "docs/[Computer] ใช้ Remote Desktop ไม่ได้หลังติดตั้ง Windows Updates.pdf", date: "05/07/2024" },
  { cat: "Computer",   name: "การเพิ่ม User ของพนักงานให้สามารถเข้าคอมหรือ internet ได้", file: "docs/[Computer] การเพิ่ม User ของพนักงานให้สามารถเข้าคอมหรือ internet ได้.pdf", date: "13/12/2024" },
  { cat: "Computer",   name: "การต่อไมค์ Logitech กับ Notebook ในห้องประชุม",     file: "docs/[Computer] การต่อไมค์ Logitech กับ Notebook ในห้องประชุม.pdf",      date: "13/12/2024" },
  { cat: "Computer",   name: "การสร้าง Shared Folder 10.31.10.10",                 file: "docs/[Computer] การสร้าง Shared Folder 10.31.10.10.pdf",                  date: "13/12/2024" },
  { cat: "Computer",   name: "คู่มือการตั้งค่า Access Control - Front Office",     file: "docs/[Computer] คู่มือการตั้งค่า Access Control - Front Office.pdf",     date: "28/06/2024" },
  { cat: "Computer",   name: "ระบบจองรถ",                                          file: "docs/[Computer] ระบบจองรถ.pdf",                                          date: "05/06/2026" },
  // Contract
  { cat: "Contract",   name: "EzMemo inter font Final",                             file: "docs/[Contract] EzMemo inter font Final.pdf",                             date: "14/05/2025" },
  // Email
  { cat: "Email",      name: "Backup Email",                                        file: "docs/[Email] Backup Email.pdf",                                           date: "13/12/2024" },
];

// ── หมวดหมู่ทั้งหมด ──
const allCats = ['ทั้งหมด', ...new Set(docs.map(d => d.cat))];
let activeCat = 'ทั้งหมด';

// ── category icon map ──
const catIcon = {
  Accountant: '🧾', AV: '🎙️', Building: '🏢', CAD: '📐',
  Comanche: '💼', Computer: '💻', Contract: '📄', Email: '✉️',
};
function getIcon(cat) { return catIcon[cat] || '📄'; }

// ── Render filter buttons ──
const filterWrap = document.getElementById('filterWrap');
allCats.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'ทั้งหมด' ? ' active' : '');
  btn.textContent = cat === 'ทั้งหมด' ? `ทั้งหมด (${docs.length})` : `${getIcon(cat)} ${cat}`;
  btn.onclick = () => {
    activeCat = cat;
    filterWrap.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  };
  filterWrap.appendChild(btn);
});

// ── Render doc cards ──
const grid = document.getElementById('docGrid');
const noResult = document.getElementById('noResult');

docs.forEach((doc, i) => {
  const card = document.createElement('div');
  card.className = 'doc-card';
  card.dataset.cat = doc.cat;
  card.dataset.search = doc.name.toLowerCase() + ' ' + doc.cat.toLowerCase();
  card.innerHTML = `
    <div class="doc-card-top">
      <div class="doc-icon">${getIcon(doc.cat)}</div>
      <div class="doc-meta">
        <div class="doc-category">${doc.cat}</div>
        <div class="doc-name">${doc.name}</div>
      </div>
    </div>
    <div class="doc-footer">
      <div class="doc-date">${doc.date}</div>
      <div class="doc-actions">
        <button class="doc-btn doc-btn-view" onclick="openPdf(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          ดู
        </button>
        <a class="doc-btn doc-btn-dl" href="${doc.file}" download="${doc.name}.pdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          โหลด
        </a>
      </div>
    </div>
  `;
  grid.insertBefore(card, noResult);
});

// ── Filter + Search ──
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cards = grid.querySelectorAll('.doc-card');
  let visible = 0;
  cards.forEach(card => {
    const catMatch = activeCat === 'ทั้งหมด' || card.dataset.cat === activeCat;
    const searchMatch = card.dataset.search.includes(q);
    const show = catMatch && searchMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  noResult.style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('statsBar').innerHTML =
    `แสดง <span>${visible}</span> จาก <span>${docs.length}</span> เอกสาร`;
}
applyFilters();

// ── PDF Modal ──
function openPdf(i) {
  const doc = docs[i];
  document.getElementById('pdfTitle').textContent = doc.name;
  document.getElementById('pdfFrame').src = doc.file;
  document.getElementById('pdfDlBtn').href = doc.file;
  document.getElementById('pdfDlBtn').download = doc.name + '.pdf';
  document.getElementById('pdfOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePdfBtn() {
  document.getElementById('pdfOverlay').classList.remove('open');
  document.getElementById('pdfFrame').src = '';
  document.body.style.overflow = '';
}
function closePdfModal(e) {
  if (e.target === document.getElementById('pdfOverlay')) closePdfBtn();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePdfBtn(); });

// ── Date ──
const d = new Date();
const days   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
document.getElementById('today').textContent =
  `วัน${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
</script>

</body>
</html>
