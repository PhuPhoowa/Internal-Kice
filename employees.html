<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อมูลพนักงาน — Internal Kice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'IBM Plex Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #F5F3EF;
    color: #2C2C2C;
    min-height: 100vh;
  }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 44px;
    height: 56px;
    border-bottom: 1px solid #E2DED8;
    background: #F5F3EF;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: #7A7470;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .back-btn:hover { background: #ECEAE6; color: #2C2C2C; }
  .back-btn svg { width: 16px; height: 16px; }
  .topbar-divider { width: 1px; height: 20px; background: #E2DED8; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #2C2C2C; }
  .topbar-date { font-size: 14px; color: #9E9890; }

  /* Container */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 44px 80px;
  }

  /* Page header */
  .page-header { margin-bottom: 36px; }
  .page-eyebrow {
    font-size: 11px;
    font-weight: 500;
    color: #A8A29A;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .page-title {
    font-size: 26px;
    font-weight: 600;
    color: #1E1E1E;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .page-sub { font-size: 14px; color: #7A7470; }
  .page-divider {
    margin-top: 24px;
    border: none;
    border-top: 1px solid #E2DED8;
  }

  /* Employee list */
  .emp-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 32px;
  }

  /* Card: รูปซ้าย ข้อมูลขวา */
  .emp-card {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 18px 24px;
    background: #FAFAF8;
    border: 1px solid #E2DED8;
    border-radius: 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.12s;
    user-select: none;
  }
  .emp-card:hover {
    border-color: #C8C2BA;
    background: #F0EDE8;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transform: translateY(-1px);
  }

  /* Avatar */
  .emp-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #E8E4DF;
    border: 2px solid #E2DED8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    color: #7A7470;
    flex-shrink: 0;
    overflow: hidden;
  }
  .emp-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .emp-info { flex: 1; min-width: 0; }
  .emp-name {
    font-size: 15px;
    font-weight: 600;
    color: #1E1E1E;
    margin-bottom: 3px;
  }
  .emp-position {
    font-size: 13px;
    color: #9E9890;
  }

  .emp-arrow {
    color: #C8C2BA;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,28,26,0.45);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #FAFAF8;
    border: 1px solid #E2DED8;
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    animation: popIn 0.18s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border: none;
    background: #ECEAE6;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #7A7470;
    font-size: 18px;
    transition: background 0.15s, color 0.15s;
  }
  .modal-close:hover { background: #E2DED8; color: #2C2C2C; }

  /* Modal avatar */
  .modal-avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 2px solid #E2DED8;
    background: #E8E4DF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 600;
    color: #7A7470;
    margin: 0 auto 18px;
    overflow: hidden;
  }
  .modal-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .modal-name {
    font-size: 20px;
    font-weight: 600;
    color: #1E1E1E;
    text-align: center;
    margin-bottom: 4px;
  }
  .modal-position {
    font-size: 14px;
    color: #9E9890;
    text-align: center;
    margin-bottom: 24px;
  }
  .modal-divider {
    border: none;
    border-top: 1px solid #E2DED8;
    margin-bottom: 20px;
  }

  /* Info rows with copy */
  .modal-info { display: flex; flex-direction: column; gap: 12px; }

  .modal-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    transition: background 0.15s;
    position: relative;
  }
  .modal-row:hover { background: #ECEAE6; }

  .modal-row-icon { font-size: 18px; flex-shrink: 0; }

  .modal-row-content { flex: 1; min-width: 0; }
  .modal-row-label {
    font-size: 11px;
    font-weight: 500;
    color: #A8A29A;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }
  .modal-row-value {
    font-size: 14px;
    color: #2C2C2C;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Copy button — ซ่อนไว้ แสดงเมื่อ hover row */
  .copy-btn {
    opacity: 0;
    flex-shrink: 0;
    width: 30px; height: 30px;
    border: none;
    background: #E2DED8;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #7A7470;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  .copy-btn svg { width: 15px; height: 15px; }
  .modal-row:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: #C8C2BA; color: #1E1E1E; }
  .copy-btn.copied { background: #D4EDD6; color: #3A7D44; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1E1E1E;
    color: #F5F3EF;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    .topbar { padding: 0 20px; }
    .container { padding: 32px 20px 60px; }
    .emp-card { padding: 14px 16px; gap: 14px; }
    .modal { padding: 28px 20px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      กลับหน้าหลัก
    </a>
    <div class="topbar-divider"></div>
    <div class="topbar-title">ข้อมูลพนักงาน</div>
  </div>
  <div class="topbar-date" id="today"></div>
</div>

<div class="container">
  <div class="page-header">
    <div class="page-eyebrow">HR / พนักงาน</div>
    <h1 class="page-title">ข้อมูลพนักงาน</h1>
    <p class="page-sub">กดที่การ์ดพนักงานเพื่อดูข้อมูลติดต่อ</p>
    <hr class="page-divider">
  </div>

  <div class="emp-list" id="empList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-avatar" id="mAvatar"></div>
    <div class="modal-name"     id="mName"></div>
    <div class="modal-position" id="mPosition"></div>
    <hr class="modal-divider">
    <div class="modal-info">

      <div class="modal-row">
        <div class="modal-row-icon">✉️</div>
        <div class="modal-row-content">
          <div class="modal-row-label">อีเมล</div>
          <div class="modal-row-value" id="mEmail"></div>
        </div>
        <button class="copy-btn" id="copyEmail" onclick="copyText('email')" title="คัดลอกอีเมล">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>

      <div class="modal-row">
        <div class="modal-row-icon">📞</div>
        <div class="modal-row-content">
          <div class="modal-row-label">เบอร์โทร</div>
          <div class="modal-row-value" id="mPhone"></div>
        </div>
        <button class="copy-btn" id="copyPhone" onclick="copyText('phone')" title="คัดลอกเบอร์โทร">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  ข้อมูลพนักงาน — แก้ไขตรงนี้ได้เลย
//  photo: ใส่ path รูป เช่น "photos/somchai.jpg"
//         ปล่อย "" เพื่อใช้ตัวย่อชื่อแทน
// ════════════════════════════════════════════
const employees = [
  { name: "สมชาย ใจดี",    position: "ผู้จัดการทั่วไป",  email: "somchai@kice.co.th",  phone: "081-234-5678", photo: "" },
  { name: "สมหญิง รักงาน", position: "ฝ่ายบุคคล",        email: "somying@kice.co.th",  phone: "082-345-6789", photo: "" },
  { name: "วิชัย มั่นคง",  position: "ฝ่าย IT",          email: "wichai@kice.co.th",   phone: "083-456-7890", photo: "" },
  { name: "นิดา สดใส",     position: "นักบัญชี",         email: "nida@kice.co.th",     phone: "084-567-8901", photo: "" },
  { name: "ประสิทธิ์ ทำดี",position: "ฝ่ายขาย",          email: "prasit@kice.co.th",   phone: "085-678-9012", photo: "" },
  { name: "มาลี สุขใจ",    position: "ฝ่ายการตลาด",      email: "malee@kice.co.th",    phone: "086-789-0123", photo: "" },
];

// ─── helpers ───
function initials(name) {
  const p = name.trim().split(' ');
  return p.length >= 2 ? p[0][0] + p[1][0] : p[0].substring(0, 2);
}
function avatarInner(emp) {
  if (emp.photo) {
    return `<img src="${emp.photo}" alt="${emp.name}"
      onerror="this.style.display='none';this.parentElement.textContent='${initials(emp.name)}'">`;
  }
  return initials(emp.name);
}

// ─── Render list ───
const list = document.getElementById('empList');
employees.forEach((emp, i) => {
  const card = document.createElement('div');
  card.className = 'emp-card';
  card.innerHTML = `
    <div class="emp-avatar">${avatarInner(emp)}</div>
    <div class="emp-info">
      <div class="emp-name">${emp.name}</div>
      <div class="emp-position">${emp.position}</div>
    </div>
    <div class="emp-arrow">›</div>
  `;
  card.onclick = () => openModal(i);
  list.appendChild(card);
});

// ─── Modal ───
let currentEmp = null;

function openModal(i) {
  currentEmp = employees[i];
  document.getElementById('mAvatar').innerHTML = avatarInner(currentEmp);
  document.getElementById('mName').textContent = currentEmp.name;
  document.getElementById('mPosition').textContent = currentEmp.position;
  document.getElementById('mEmail').textContent = currentEmp.email;
  document.getElementById('mPhone').textContent = currentEmp.phone;
  // reset copy buttons
  ['copyEmail','copyPhone'].forEach(id => {
    document.getElementById(id).classList.remove('copied');
  });
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

// ─── Copy ───
function copyText(field) {
  if (!currentEmp) return;
  const value = field === 'email' ? currentEmp.email : currentEmp.phone;
  const btnId  = field === 'email' ? 'copyEmail' : 'copyPhone';
  const label  = field === 'email' ? 'คัดลอกอีเมลแล้ว' : 'คัดลอกเบอร์โทรแล้ว';

  navigator.clipboard.writeText(value).then(() => {
    const btn = document.getElementById(btnId);
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><polyline points="20 6 9 17 4 12"/></svg>`;
    showToast(label);
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
    }, 2000);
  });
}

// ─── Toast ───
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Date ───
const d = new Date();
const days   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
document.getElementById('today').textContent =
  `วัน${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
</script>

</body>
</html>
