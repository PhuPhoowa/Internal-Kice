<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อมูลพนักงาน — Internal Kice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'IBM Plex Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #F7F9FC;
    color: #2C2C2C;
    min-height: 100vh;
  }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 44px; height: 58px;
    background: #1E3A8A;
    position: sticky; top: 0; z-index: 200;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; color: #E4E8F5; text-decoration: none;
    padding: 6px 10px; border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .back-btn:hover { background: #DBEAFE; color: #2C2C2C; }
  .back-btn svg { width: 16px; height: 16px; }
  .topbar-divider { width: 1px; height: 20px; background: #BFDBFE; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #FFFFFF; }
  .topbar-date { font-size: 14px; color: #94A3B8; }

  /* ── Container ── */
  .container { max-width: 1000px; margin: 0 auto; padding: 48px 44px 80px; }

  /* ── Page header ── */
  .page-header { margin-bottom: 28px; }
  .page-eyebrow {
    font-size: 11px; font-weight: 500; color: #3B82F6;
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
  }
  .page-title { font-size: 26px; font-weight: 600; color: #1E3A8A; letter-spacing: -0.02em; margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: #64748B; }

  /* ── Search ── */
  .search-wrap {
    margin-top: 24px;
    position: relative;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #3B82F6; pointer-events: none;
  }
  .search-icon svg { width: 17px; height: 17px; }
  .search-input {
    width: 100%;
    padding: 11px 16px 11px 42px;
    font-size: 14px;
    font-family: inherit;
    background: #FFFFFF;
    border: 1px solid #DBEAFE;
    border-radius: 10px;
    color: #2C2C2C;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: #94A3B8; }
  .search-input:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(168,162,154,0.15); }

  .page-divider { margin-top: 24px; border: none; border-top: 1px solid #E2DED8; }

  /* ── Employee grid 3 col ── */
  .emp-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 28px;
  }

  /* ── Employee card ── */
  .emp-card {
    background: #FFFFFF;
    border: 1px solid #DBEAFE;
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.12s;
    text-align: center;
    user-select: none;
  }
  .emp-card:hover {
    border-color: #93C5FD;
    background: #EFF6FF;
    box-shadow: 0 4px 16px rgba(37,99,235,0.1);
    transform: translateY(-2px);
  }
  .emp-card.hidden { display: none; }

  .emp-avatar {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: #DBEAFE;
    border: 2px solid #E2DED8;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600; color: #64748B;
    flex-shrink: 0; overflow: hidden;
  }
  .emp-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .emp-name { font-size: 15px; font-weight: 600; color: #1E1E1E; line-height: 1.3; }
  .emp-position { font-size: 12px; color: #94A3B8; }

  /* no result */
  .no-result {
    display: none;
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 0;
    font-size: 14px;
    color: #94A3B8;
  }

  /* ── Modal overlay ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(30,28,26,0.45);
    z-index: 500;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #FFFFFF;
    border: 1px solid #DBEAFE;
    border-radius: 20px;
    width: 100%; max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    animation: popIn 0.18s ease;
    overflow: hidden;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }

  .modal-close {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px;
    border: none; background: #DBEAFE; border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #64748B; font-size: 16px;
    transition: background 0.15s, color 0.15s;
    z-index: 10;
  }
  .modal-close:hover { background: #BFDBFE; color: #2C2C2C; }

  /* Modal body: รูปซ้าย ข้อมูลขวา */
  .modal-body {
    display: flex;
    align-items: stretch;
    min-height: 200px;
  }

  /* Left panel — รูป */
  .modal-left {
    width: 160px;
    flex-shrink: 0;
    background: #DBEAFE;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    gap: 12px;
  }
  .modal-avatar {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: #BFDBFE;
    border: 2px solid #D8D4CE;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 600; color: #64748B;
    overflow: hidden;
  }
  .modal-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .modal-left-name { font-size: 13px; font-weight: 600; color: #2C2C2C; text-align: center; line-height: 1.3; }
  .modal-left-pos  { font-size: 11px; color: #94A3B8; text-align: center; line-height: 1.4; }

  /* Right panel — ข้อมูล */
  .modal-right {
    flex: 1;
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }

  .modal-info-row { display: flex; flex-direction: column; gap: 2px; }
  .modal-info-label {
    font-size: 10px; font-weight: 500; color: #3B82F6;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  /* value + copy button */
  .modal-info-value-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    transition: background 0.15s;
    margin: 0 -10px;
  }
  .modal-info-value-wrap:hover { background: #DBEAFE; }

  .modal-info-value {
    font-size: 14px; color: #2C2C2C;
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .copy-btn {
    opacity: 0;
    flex-shrink: 0;
    width: 28px; height: 28px;
    border: none; background: #BFDBFE; border-radius: 7px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #64748B;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  .copy-btn svg { width: 14px; height: 14px; }
  .modal-info-value-wrap:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: #C8C2BA; color: #1E1E1E; }
  .copy-btn.copied { background: #DBEAFE; color: #1D4ED8; opacity: 1; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1E3A8A; color: #FFFFFF;
    font-size: 13px; padding: 10px 20px; border-radius: 10px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px) {
    .topbar { padding: 0 20px; }
    .container { padding: 32px 20px 60px; }
    .emp-grid { grid-template-columns: repeat(2, 1fr); }
    .modal-left { width: 130px; }
  }
  @media (max-width: 480px) {
    .emp-grid { grid-template-columns: 1fr; }
    .modal-body { flex-direction: column; }
    .modal-left { width: 100%; flex-direction: row; padding: 20px; gap: 16px; }
    .modal-left-name, .modal-left-pos { text-align: left; }
    .modal-right { padding: 20px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      กลับหน้าหลัก
    </a>
    <div class="topbar-divider"></div>
    <div class="topbar-title">ข้อมูลพนักงาน</div>
  </div>
  <div class="topbar-date" id="today"></div>
</div>

<div class="container">
  <div class="page-header">
    <div class="page-eyebrow">HR / พนักงาน</div>
    <h1 class="page-title">ข้อมูลพนักงาน</h1>
    <p class="page-sub">กดที่การ์ดพนักงานเพื่อดูข้อมูลติดต่อ</p>

    <div class="search-wrap">
      <div class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </div>
      <input class="search-input" type="text" id="searchInput"
        placeholder="ค้นหาชื่อหรือตำแหน่ง..." oninput="filterEmployees()">
    </div>

    <hr class="page-divider">
  </div>

  <div class="emp-grid" id="empGrid">
    <div class="no-result" id="noResult">ไม่พบพนักงานที่ค้นหา</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-body">

      <!-- Left: รูป -->
      <div class="modal-left">
        <div class="modal-avatar" id="mAvatar"></div>
        <div class="modal-left-name" id="mName"></div>
        <div class="modal-left-pos"  id="mPosition"></div>
      </div>

      <!-- Right: ข้อมูล -->
      <div class="modal-right">

        <div class="modal-info-row">
          <div class="modal-info-label">📧 อีเมล</div>
          <div class="modal-info-value-wrap">
            <div class="modal-info-value" id="mEmail"></div>
            <button class="copy-btn" id="copyEmail" onclick="copyField('email')" title="คัดลอกอีเมล">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="modal-info-row">
          <div class="modal-info-label">📞 เบอร์โทร</div>
          <div class="modal-info-value-wrap">
            <div class="modal-info-value" id="mPhone"></div>
            <button class="copy-btn" id="copyPhone" onclick="copyField('phone')" title="คัดลอกเบอร์โทร">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
//  ข้อมูลพนักงาน — แก้ไขตรงนี้ได้เลย
//  photo: ใส่ path รูป เช่น "photos/somchai.jpg"
//         ปล่อย "" เพื่อใช้ตัวย่อชื่อแทน
// ════════════════════════════════════════════
const employees = [
  { name: "สมชาย ใจดี",     position: "ผู้จัดการทั่วไป",  email: "somchai@kice.co.th",  phone: "081-234-5678", photo: "" },
  { name: "สมหญิง รักงาน",  position: "ฝ่ายบุคคล",        email: "somying@kice.co.th",  phone: "082-345-6789", photo: "" },
  { name: "วิชัย มั่นคง",   position: "ฝ่าย IT",          email: "wichai@kice.co.th",   phone: "083-456-7890", photo: "" },
  { name: "นิดา สดใส",      position: "นักบัญชี",         email: "nida@kice.co.th",     phone: "084-567-8901", photo: "" },
  { name: "ประสิทธิ์ ทำดี", position: "ฝ่ายขาย",          email: "prasit@kice.co.th",   phone: "085-678-9012", photo: "" },
  { name: "มาลี สุขใจ",     position: "ฝ่ายการตลาด",      email: "malee@kice.co.th",    phone: "086-789-0123", photo: "" },
];

// ─── helpers ───
function initials(name) {
  const p = name.trim().split(' ');
  return p.length >= 2 ? p[0][0] + p[1][0] : p[0].substring(0, 2);
}
function avatarInner(emp) {
  if (emp.photo) {
    return `<img src="${emp.photo}" alt="${emp.name}"
      onerror="this.style.display='none';this.parentElement.textContent='${initials(emp.name)}'">`;
  }
  return initials(emp.name);
}

// ─── Render cards ───
const grid = document.getElementById('empGrid');
const noResult = document.getElementById('noResult');

employees.forEach((emp, i) => {
  const card = document.createElement('div');
  card.className = 'emp-card';
  card.dataset.search = (emp.name + ' ' + emp.position).toLowerCase();
  card.innerHTML = `
    <div class="emp-avatar">${avatarInner(emp)}</div>
    <div class="emp-name">${emp.name}</div>
    <div class="emp-position">${emp.position}</div>
  `;
  card.onclick = () => openModal(i);
  grid.insertBefore(card, noResult);
});

// ─── Search ───
function filterEmployees() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cards = grid.querySelectorAll('.emp-card');
  let visible = 0;
  cards.forEach(c => {
    const match = c.dataset.search.includes(q);
    c.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  noResult.style.display = visible === 0 ? 'block' : 'none';
}

// ─── Modal ───
let currentEmp = null;

function openModal(i) {
  currentEmp = employees[i];
  document.getElementById('mAvatar').innerHTML = avatarInner(currentEmp);
  document.getElementById('mName').textContent = currentEmp.name;
  document.getElementById('mPosition').textContent = currentEmp.position;
  document.getElementById('mEmail').textContent = currentEmp.email;
  document.getElementById('mPhone').textContent = currentEmp.phone;
  ['copyEmail','copyPhone'].forEach(id => resetCopyBtn(id));
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

// ─── Copy ───
const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
const checkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="20 6 9 17 4 12"/></svg>`;

function resetCopyBtn(id) {
  const btn = document.getElementById(id);
  btn.classList.remove('copied');
  btn.innerHTML = copyIcon;
}

function copyField(field) {
  if (!currentEmp) return;
  const value = field === 'email' ? currentEmp.email : currentEmp.phone;
  const btnId  = field === 'email' ? 'copyEmail' : 'copyPhone';
  const label  = field === 'email' ? 'คัดลอกอีเมลแล้ว ✓' : 'คัดลอกเบอร์โทรแล้ว ✓';
  navigator.clipboard.writeText(value).then(() => {
    const btn = document.getElementById(btnId);
    btn.classList.add('copied');
    btn.innerHTML = checkIcon;
    showToast(label);
    setTimeout(() => resetCopyBtn(btnId), 2000);
  });
}

// ─── Toast ───
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Date ───
const d = new Date();
const days   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
document.getElementById('today').textContent =
  `วัน${days[d.getDay()]}ที่ ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
</script>

</body>
</html>
